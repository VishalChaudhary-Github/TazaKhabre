<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<body style="background-color: #f3f3e8">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous">
</script>
{% load static %}
<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
      <a class="d-flex align-items-center col-md-3 mb-2 mb-md-0 text-dark text-decoration-none">
        <img src="{% static 'ico.png' %}" alt="logo">
          <span class="fs-4"><b>TazaKhabre</b></span>
      </a>

        <div class="dropdown">
            <a class="btn rounded-pill btn-outline-warning" role="button" style="margin-right: 10px; color: black">Trending</a>
            <button class="btn rounded-pill btn-outline-warning dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="color: black">
                Categories
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=general">General</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=business">Business</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=entertainment">Entertainment</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=health">Health</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=science">Science</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=sports">Sports</a></li>
                <li><a class="dropdown-item" href="{% url 'home-page' %}?category=technology">Technology</a></li>
            </ul>
        </div>

      <div class="col-md-3 text-end">
        <button type="button" class="btn rounded-pill btn-outline-danger me-2">Subscribe</button>
      </div>
    </header>
  </div>

<div class="container-sm">
    <div class="row">
        <div class="col-sm-8">
            {% for article in articles %}
                {% if article.urlToImage != None %}
                <div class="shadow" style="margin-bottom: 30px">
                    <div class="card text-bg-warning">
                      <img src="{{ article.urlToImage }}" class="card-img" alt="...">
                      <div class="card-img-overlay">
                        <h5 class="card-title" style="color: white">{{ article.title }}</h5>
                        <p class="card-text">{{ article.description }}</p>
                      </div>
                    </div>
                </div>
                {% endif %}
            {% endfor %}
        </div>
        <div class="col-sm-4">
            foo
        </div>
    </div>
</div>

</body>
</html>
